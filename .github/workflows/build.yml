name: Build mpv Windows (cmake)

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: i686
            target: i686-w64-mingw32
          - arch: x86_64
            target: x86_64-w64-mingw32

    env:
      TARGET_ARCH: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v5

      - name: Restore ccache
        uses: actions/cache/restore@v5
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.arch }}-${{ github.sha }}
          restore-keys: ccache-${{ matrix.arch }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build gyp mercurial subversion \
            yasm nasm automake pkgconf libtool gcc-multilib g++-multilib clang lld \
            libc++-dev libc++abi-dev libgmp-dev libmpfr-dev libmpc-dev libgcrypt20-dev \
            gperf ragel texinfo autopoint re2c python3-pip curl p7zip-full ccache
          pip3 install rst2pdf meson mako jsonschema

      - name: Build toolchain + mpv
        run: |
          cmake -DTARGET_ARCH=${{ matrix.target }} \
            -DSINGLE_SOURCE_LOCATION="${{ github.workspace }}/packages" \
            -G Ninja -B build -S .
          cd build
          ninja download
          ninja gcc
          ninja mpv

      - name: Collect artifacts
        run: |
          mkdir -p release
          cd build
          # Find mpv.exe and all DLLs in the install prefix
          find install -name "mpv.exe" -exec cp {} ../release/ \;
          find install -name "libmpv*.dll" -exec cp {} ../release/ \;
          find install -name "libmpv*.dll.a" -exec cp {} ../release/ \;
          find install -name "libmpv*.a" -exec cp {} ../release/ \;
          # Find headers
          mkdir -p ../release/include/mpv
          find install -path "*/include/mpv/*.h" -exec cp {} ../release/include/mpv/ \;
          echo "=== Release contents ==="
          ls -lh ../release/

      - name: Save ccache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.arch }}-${{ github.sha }}

      - uses: actions/upload-artifact@v7
        with:
          name: mpv-cmake-${{ matrix.arch }}
          path: release/
